<div class="container">
  <div class="header">
    <h2>Moje zadania</h2>
    <div>
      <a routerLink="/tasks/new"><button>+ Nowe zadanie</button></a>
      <button (click)="logout()">Wyloguj</button>
    </div>
  </div>

  <div class="filters">
    <select [(ngModel)]="filterStatus" (change)="loadTasks()">
      <option value="">Wszystkie statusy</option>
      <option>Nowe</option>
      <option>W trakcie</option>
      <option>Wykonane</option>
    </select>
    <input [(ngModel)]="filterCategory" placeholder="Filtruj kategorię"
           (input)="loadTasks()" />
  </div>

  <div *ngFor="let task of tasks" class="task-card">
    <div>
      <strong>{{ task.title }}</strong>
      <span class="badge">{{ task.status }}</span>
      <span class="badge">{{ task.priority }}</span>
    </div>
    <div class="task-meta">
      {{ task.category }} | Termin: {{ task.dueDate | date:'dd.MM.yyyy' }}
    </div>
    <div class="task-actions">
      <a [routerLink]="['/tasks', task.id]">Szczegóły</a>
      <a [routerLink]="['/tasks/edit', task.id]">Edytuj</a>
      <button (click)="delete(task.id)">Usuń</button>
    </div>
  </div>

  <p *ngIf="tasks.length === 0">Brak zadań. Dodaj pierwsze!</p>
</div>
